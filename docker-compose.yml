services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: india-grid-db
    environment:
      POSTGRES_USER: grid
      POSTGRES_PASSWORD: grid
      POSTGRES_DB: india_grid
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grid -d india_grid"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
