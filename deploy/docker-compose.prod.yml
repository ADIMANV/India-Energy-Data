# Production stack for the VPS. Run from the repo root:
#   docker compose -f deploy/docker-compose.prod.yml --env-file .env up -d --wait
#
# Services:
#   db    — TimescaleDB, data in named volume, admin access from localhost only
#   api   — read-only FastAPI on 127.0.0.1:8000 (fronted by caddy)
#   caddy — TLS termination for $API_DOMAIN (Let's Encrypt, ports 80/443)
#   tick  — scraper tick, profile "tools": run by cron, never long-running
name: india-grid

services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: grid
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: india_grid
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grid -d india_grid"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      GRID_DB_DSN: postgresql://grid:${POSTGRES_PASSWORD}@db:5432/india_grid
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:?set in .env (DNS A record must point here)}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  tick:
    profiles: ["tools"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: python -m gridscrapers.tick
    environment:
      GRID_DB_DSN: postgresql://grid:${POSTGRES_PASSWORD}@db:5432/india_grid
      HEALTHCHECK_URL: ${HEALTHCHECK_URL:-}
      # enables the Maharashtra vision parser; unset → maha_vision soft-skips
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  caddy_data:
  caddy_config:
